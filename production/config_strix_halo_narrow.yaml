# Strix Halo APU Training Configuration — Bandwidth-Optimized Model Variant
#
# This is an EXPERIMENTAL config variant that trades model width for depth
# to better match the RDNA 3.5 memory bandwidth characteristics.
#
# On the Strix Halo APU (~120 GB/s LPDDR5X bandwidth), transformer blocks
# are memory-bandwidth bound: each layer must load all weight matrices from
# memory. A "deep and narrow" architecture reduces the per-layer weight size
# while maintaining total parameter count, keeping compute units fed.
#
# Standard (config_strix_halo.yaml):  hidden=768, depth=18  (~394M params)
# This variant:                       hidden=512, depth=36  (~282M params)
#
# Trade-offs:
#   + Smaller weight matrices = faster per-layer memory fetches
#   + More layers = better feature composition
#   - Reduced per-layer capacity (512 vs 768 hidden dim)
#   - More sequential layers (latency per step may increase)
#   - Fewer attention heads (8 vs 12)

model:
  hidden_size: 512
  depth: 36
  num_heads: 8
  patch_size: 16
  mlp_ratio: 4.0
  in_channels: 3
  prediction_type: x_prediction
  input_size: 1024
  num_pose_joints: 133
  pose_confidence_threshold: 0.05

training:
  total_steps: 6000
  warmup_steps: 500
  batch_size: 8                          # Smaller model → more room for batches
  grad_accumulation_steps: 32            # Effective batch = 8 × 32 = 256

  optimizer:
    type: "Muon"
    lr: 3.0e-4
    min_lr: 1.0e-6
    betas: [0.9, 0.95]
    weight_decay: 0.03
    eps: 1.0e-8
    muon:
      momentum: 0.95
      nesterov: true
      ns_steps: 5
      ns_warmup_steps: 500
      ns_warmup_value: 2
      adjust_lr_fn: "match_rms_adamw"

  grad_clip: 1.0
  ema_decay: 0.9999
  ema_warmup_steps: 500

  cfg_dropout:
    p_uncond: 0.1
    p_text_only: 0.25
    p_dino_cls_only: 0.05
    p_dino_patches_only: 0.05
    p_drop_pose: 0.10
    p_pose_only: 0.05

  repa:
    enabled: true
    weight: 0.5
    block_index: -1
    loss_type: "cosine"

  tread:
    enabled: true
    routing_probability: 0.5
    route_start: 2
    route_end: -1                        # Wider routing range for deeper model
    self_guidance: true
    guidance_scale: 3.0

  timestep_sampling: "logit_normal"
  logit_normal_loc: 0.0
  logit_normal_scale: 1.0

  gradient_checkpointing: false
  mixed_precision: true
  precision: "bfloat16"
  compile: true
  inductor_max_autotune: true

  resolution_schedule:
    - until_step: 500
      scale: 0.25
      batch_size: 32                     # Smaller model: much larger batches at 256px
      grad_accumulation_steps: 8
    - until_step: 3000
      scale: 0.5
      batch_size: 16
      grad_accumulation_steps: 16
    - until_step: 6000
      scale: 1.0
      batch_size: 8
      grad_accumulation_steps: 32

  perceptual:
    enabled: false

data:
  shard_base_dir: "data/shards/faces7k"
  derived_dir: "data/derived"
  metadata_jsonl: "data/derived/approved_image_dataset.jsonl"
  buckets:
    - "bucket_1024x1024"
    - "bucket_1216x832"
    - "bucket_1280x768"
    - "bucket_1344x704"
    - "bucket_704x1344"
    - "bucket_768x1280"
    - "bucket_832x1216"
  bucket_sampling: "proportional"
  zero_copy: true
  num_workers: 2
  prefetch_factor: 2
  pin_memory: false

sampling:
  num_steps: 35
  text_scale: 3.0
  dino_scale: 2.5
  self_guidance: true
  guidance_scale: 3.0

validation:
  enabled: true
  interval_steps: 100
  num_samples: 25
  output_dir: "validation_outputs"
  run_reconstruction: true
  run_dino_swap: true
  run_text_manip: true
  visual_debug_interval: 10
  visual_debug_num_samples: 4
  visual_debug_dir: "visual_debug"

checkpoint:
  save_every: 100
  keep_last_n: 3
  output_dir: "checkpoints"
  save_optimizer: true

logging:
  log_every: 2
  log_file: "training.log"
  monitor_velocity_norm: true
  monitor_grad_norm: true
  velocity_norm_warning: 10.0
  grad_norm_warning: 10.0

paths:
  t5_path: "models/t5xxl_fp16.safetensors"
