model:
  hidden_size: 768
  depth: 18
  num_heads: 12
  patch_size: 16
  mlp_ratio: 4.0
  in_channels: 3
  prediction_type: x_prediction
  input_size: 1024
  num_pose_joints: 133
  pose_confidence_threshold: 0.05
training:
  total_steps: 6000
  warmup_steps: 500
  batch_size: 1
  grad_accumulation_steps: 256
  optimizer:
    type: AdamW
    lr: 0.0003
    min_lr: 1.0e-06
    betas:
    - 0.9
    - 0.95
    weight_decay: 0.03
    eps: 1.0e-08
  grad_clip: 1.0
  ema_decay: 0.9999
  ema_warmup_steps: 500
  cfg_dropout:
    p_uncond: 0.1
    p_text_only: 0.25
    p_dino_cls_only: 0.05
    p_dino_patches_only: 0.05
    p_drop_pose: 0.1
    p_pose_only: 0.05
  repa:
    enabled: true
    weight: 0.5
    block_index: -1
    loss_type: cosine
  tread:
    enabled: true
    routing_probability: 0.65
    route_start: 1
    route_end: -1
    self_guidance: true
    guidance_scale: 3.0
  maskdit:
    enabled: true
    mask_ratio: 0.75
    decoder_depth: 4
    mae_loss_weight: 0.1
  galore:
    enabled: true
    rank: 128
    update_proj_gap: 200
    scale: 0.25
  timestep_sampling: logit_normal
  logit_normal_loc: 0.0
  logit_normal_scale: 1.0
  gradient_checkpointing: true
  mixed_precision: true
  precision: float16
  resolution_schedule:
  - until_step: 1500
    scale: 0.125
    batch_size: 16
    grad_accumulation_steps: 16
  - until_step: 3500
    scale: 0.25
    batch_size: 8
    grad_accumulation_steps: 32
  - until_step: 5000
    scale: 0.5
    batch_size: 4
    grad_accumulation_steps: 64
  - until_step: 6000
    scale: 0.75
    batch_size: 2
    grad_accumulation_steps: 128
  perceptual:
    enabled: false
data:
  shard_base_dir: data/shards/faces7k
  buckets:
  - bucket_1024x1024
  - bucket_1216x832
  - bucket_1280x768
  - bucket_1344x704
  - bucket_704x1344
  - bucket_768x1280
  - bucket_832x1216
  bucket_sampling: proportional
  num_workers: 2
  prefetch_factor: 1
  pin_memory: true
sampling:
  num_steps: 25
  text_scale: 3.0
  dino_scale: 2.5
  self_guidance: true
  guidance_scale: 3.0
validation:
  enabled: false
  interval_steps: 500
  num_samples: 10
  output_dir: validation_outputs
  run_reconstruction: true
  run_dino_swap: false
  run_text_manip: false
  visual_debug_interval: 50
  visual_debug_num_samples: 2
  visual_debug_dir: visual_debug
checkpoint:
  save_every: 500
  keep_last_n: 2
  output_dir: checkpoints
  save_optimizer: false
logging:
  log_every: 2
  log_file: training.log
  monitor_velocity_norm: true
  monitor_grad_norm: true
  velocity_norm_warning: 10.0
  grad_norm_warning: 10.0
paths:
  t5_path: models/t5xxl_fp16.safetensors
