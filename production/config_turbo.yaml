# Operation Turbo: RTX 2070 (8GB) Training Configuration
# Targets ~8x training speedup via MaskDiT + TREAD + fp16 + GaLore
#
# Key differences from production config (RTX 4090):
#   - MaskDiT: 75% token masking → encoder sees 25% of patches
#   - TREAD: 65% routing (up from 50%) → 35% of remaining tokens in middle blocks
#   - fp16 + GradScaler (bfloat16 not supported on Turing/RTX 2070)
#   - GaLore: gradient low-rank projection → 65% optimizer memory reduction
#   - Aggressive resolution schedule: start at 128x128, max 768x768
#   - Combined theoretical speedup: ~9.3x

model:
  hidden_size: 768             # Keep full model size — GaLore makes it fit in 8GB
  depth: 18
  num_heads: 12
  patch_size: 16
  mlp_ratio: 4.0
  in_channels: 3
  prediction_type: x_prediction
  input_size: 1024
  num_pose_joints: 133
  pose_confidence_threshold: 0.05

training:
  total_steps: 6000
  warmup_steps: 500
  batch_size: 1
  grad_accumulation_steps: 256

  optimizer:
    type: "AdamW"                    # GaLore replaces Muon; uses GaLoreAdamW under the hood
    lr: 3.0e-4
    min_lr: 1.0e-6
    betas: [0.9, 0.95]
    weight_decay: 0.03
    eps: 1.0e-8

  grad_clip: 1.0
  ema_decay: 0.9999
  ema_warmup_steps: 500

  cfg_dropout:
    p_uncond: 0.1
    p_text_only: 0.25
    p_dino_cls_only: 0.05
    p_dino_patches_only: 0.05
    p_drop_pose: 0.10
    p_pose_only: 0.05

  repa:
    enabled: true
    weight: 0.5
    block_index: -1
    loss_type: "cosine"

  tread:
    enabled: true
    routing_probability: 0.65        # ← Up from 0.5 for more aggressive compute reduction
    route_start: 1
    route_end: -1
    self_guidance: true
    guidance_scale: 3.0

  # MaskDiT — the keystone optimization
  maskdit:
    enabled: true
    mask_ratio: 0.75                 # Mask 75% of image tokens, encoder sees only 25%
    decoder_depth: 4                 # Lightweight decoder reconstructs full token sequence
    mae_loss_weight: 0.1             # Auxiliary MAE reconstruction loss on masked tokens

  # GaLore — gradient low-rank projection for 65% optimizer memory reduction
  galore:
    enabled: true
    rank: 128                        # Low-rank projection dimension
    update_proj_gap: 200             # Re-project every 200 steps
    scale: 0.25                      # Gradient scaling factor

  timestep_sampling: "logit_normal"
  logit_normal_loc: 0.0
  logit_normal_scale: 1.0

  gradient_checkpointing: true       # Still needed for safety on 8GB

  # RTX 2070: float16 with GradScaler (no bfloat16 on Turing)
  mixed_precision: true
  precision: "float16"

  perceptual:
    enabled: false

data:
  shard_base_dir: "data/shards/faces7k"
  buckets:
    - "bucket_1024x1024"
    - "bucket_1216x832"
    - "bucket_1280x768"
    - "bucket_1344x704"
    - "bucket_704x1344"
    - "bucket_768x1280"
    - "bucket_832x1216"
  bucket_sampling: "proportional"
  num_workers: 2                     # Fewer workers to save system memory
  prefetch_factor: 1
  pin_memory: true

sampling:
  num_steps: 25                      # Fewer Euler steps for faster validation
  text_scale: 3.0
  dino_scale: 2.5
  self_guidance: true
  guidance_scale: 3.0

validation:
  enabled: false                     # Disable during training to save memory
  interval_steps: 500
  num_samples: 10
  output_dir: "validation_outputs"
  run_reconstruction: true
  run_dino_swap: false               # Skip expensive tests
  run_text_manip: false
  visual_debug_interval: 50
  visual_debug_num_samples: 2
  visual_debug_dir: "visual_debug"

checkpoint:
  save_every: 500
  keep_last_n: 2                     # Keep fewer checkpoints to save disk
  output_dir: "checkpoints"
  save_optimizer: false              # Don't save GaLore state (large, can re-init)

logging:
  log_every: 2
  log_file: "training.log"
  monitor_velocity_norm: true
  monitor_grad_norm: true
  velocity_norm_warning: 10.0
  grad_norm_warning: 10.0

paths:
  t5_path: "models/t5xxl_fp16.safetensors"
