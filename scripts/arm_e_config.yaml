# Arm E: Full Stack + Seg Weight
# Identical to Arm D (Full Stack / config.yaml) except seg_weight is enabled.
# Purpose: ablation — does spatial face-region loss weighting improve geometric fidelity + text LPIPS?
#
# Weights: face classes (2,3,23-27) → 2×, background (0) → 0.5×, other → 1×
# normalize=true keeps expected loss magnitude comparable to Arm D's unweighted baseline.

model:
  hidden_size: 768
  depth: 18
  num_heads: 12
  patch_size: 16
  mlp_ratio: 4.0
  in_channels: 3
  prediction_type: x_prediction
  input_size: 1024
  num_pose_joints: 133
  pose_confidence_threshold: 0.05

training:
  total_steps: 6000
  warmup_steps: 500
  batch_size: 1
  grad_accumulation_steps: 256

  optimizer:
    type: "Muon"
    lr: 3.0e-4
    min_lr: 1.0e-6
    betas: [0.9, 0.95]
    weight_decay: 0.03
    eps: 1.0e-8
    muon:
      momentum: 0.95
      nesterov: true
      ns_steps: 5
      adjust_lr_fn: "match_rms_adamw"

  grad_clip: 1.0
  ema_decay: 0.9999
  ema_warmup_steps: 500

  cfg_dropout:
    p_uncond: 0.1
    p_text_only: 0.25
    p_dino_cls_only: 0.05
    p_dino_patches_only: 0.05
    p_drop_pose: 0.10
    p_pose_only: 0.05

  repa:
    enabled: true
    weight: 0.5
    block_index: -1
    loss_type: "cosine"
    decay_start_step: 1000
    decay_end_step: 2000

  tread:
    enabled: true
    routing_probability: 0.5
    route_start: 1
    route_end: -1
    self_guidance: true
    guidance_scale: 3.0

  timestep_sampling: "logit_normal"
  logit_normal_loc: 0.0
  logit_normal_scale: 1.0

  gradient_checkpointing: true

  mixed_precision: true
  precision: "bfloat16"

  resolution_schedule:
    - until_step: 500
      scale: 0.25
    - until_step: 3000
      scale: 0.5
    - until_step: 6000
      scale: 1.0

  perceptual:
    enabled: false
    lpips_weight: 0.1
    every_n_microsteps: 4
    crop_size: 256

  # ── Arm E delta ──────────────────────────────────────────────────────────────
  seg_weight:
    enabled: true
    face_weight: 2.0      # Sapiens classes: Face_Neck(2), Hair(3), lips(23-27) → 2×
    bg_weight: 0.5        # Background(0) → 0.5×  (reduces gradient dilution)
    other_weight: 1.0     # All other classes
    normalize: true       # Per-sample mean normalisation → same expected loss scale as Arm D
  # ─────────────────────────────────────────────────────────────────────────────

data:
  source: "stratum"
  stratum_dir: "$STRATUM_DIR"
  shard_base_dir: "data/shards/faces7k"
  buckets:
    - "bucket_1024x1024"
    - "bucket_1216x832"
    - "bucket_1280x768"
    - "bucket_1344x704"
    - "bucket_704x1344"
    - "bucket_768x1280"
    - "bucket_832x1216"
  bucket_sampling: "proportional"
  num_workers: 4
  prefetch_factor: 2
  pin_memory: true

sampling:
  num_steps: 35
  text_scale: 3.0
  dino_scale: 2.5
  self_guidance: true
  guidance_scale: 3.0

validation:
  enabled: true
  interval_steps: 100
  num_samples: 25
  output_dir: "validation_outputs"
  run_reconstruction: true
  run_dino_swap: true
  run_text_manip: true
  visual_debug_interval: 500
  visual_debug_num_samples: 4
  visual_debug_dir: "visual_debug"

checkpoint:
  save_every: 100
  keep_last_n: 3
  output_dir: "checkpoints"
  save_optimizer: true

logging:
  log_every: 2
  log_file: "training.log"
  monitor_velocity_norm: true
  monitor_grad_norm: true
  velocity_norm_warning: 10.0
  grad_norm_warning: 10.0

paths:
  t5_path: "models/t5xxl_fp16.safetensors"
