# Ablation Config D: Full Stack (TREAD, Muon, REPA)
# Purpose: Tests all optimizations together.
# Compare against: All other configs

model:
  hidden_size: 768
  depth: 18
  num_heads: 12
  patch_size: 16
  mlp_ratio: 4.0
  in_channels: 3
  prediction_type: x_prediction
  input_size: 1024
  num_pose_joints: 133
  pose_confidence_threshold: 0.05
training:
  total_steps: 5000
  warmup_steps: 500
  batch_size: 1
  grad_accumulation_steps: 256
  optimizer:
    type: Muon
    lr: 0.0003
    min_lr: 1.0e-06
    betas:
    - 0.9
    - 0.95
    weight_decay: 0.03
    eps: 1.0e-08
    muon:
      momentum: 0.95
      nesterov: true
      ns_steps: 5
      adjust_lr_fn: match_rms_adamw
  grad_clip: 1.0
  ema_decay: 0.9999
  ema_warmup_steps: 500
  cfg_dropout:
    p_uncond: 0.1
    p_text_only: 0.25
    p_dino_cls_only: 0.05
    p_dino_patches_only: 0.05
    p_drop_pose: 0.1
    p_pose_only: 0.05
  repa:
    enabled: true
    weight: 0.5
    block_index: -1
    loss_type: cosine
  tread:
    enabled: true
    routing_probability: 0.5
    route_start: 1
    route_end: -1
    self_guidance: true
    guidance_scale: 3.0
  timestep_sampling: logit_normal
  logit_normal_loc: 0.0
  logit_normal_scale: 1.0
  gradient_checkpointing: true
  mixed_precision: true
  precision: bfloat16
  resolution_schedule:
  - until_step: 5000
    scale: 1.0
  perceptual:
    enabled: false
    lpips_weight: 0.1
    every_n_microsteps: 4
    crop_size: 256
data:
  shard_base_dir: data/shards/faces7k
  buckets:
  - bucket_1024x1024
  bucket_sampling: proportional
  num_workers: 4
  prefetch_factor: 2
  pin_memory: true
sampling:
  num_steps: 35
  self_guidance: true
  guidance_scale: 3.0
validation:
  enabled: true
  interval_steps: 1000
  num_samples: 25
  output_dir: validation_outputs
  run_reconstruction: true
  run_dino_swap: true
  run_text_manip: true
  visual_debug_interval: 100
  visual_debug_num_samples: 4
  visual_debug_dir: visual_debug
checkpoint:
  save_every: 500
  keep_last_n: 3
  output_dir: checkpoints
  save_optimizer: true
logging:
  log_every: 2
  log_file: training.log
  monitor_velocity_norm: true
  monitor_grad_norm: true
  velocity_norm_warning: 10.0
  grad_norm_warning: 10.0
paths:
  t5_path: models/t5xxl_fp16.safetensors
