# Arm 5: VRAM-Resident Dataset
# + entire dataset pre-loaded to VRAM — zero PCIe transfers during training
# Measures reference it/s on a 4090

model:
  hidden_size: 768
  depth: 18
  num_heads: 12
  patch_size: 16
  mlp_ratio: 4.0
  in_channels: 3
  prediction_type: x_prediction
  input_size: 1024
  num_pose_joints: 133
  pose_confidence_threshold: 0.05

training:
  total_steps: 300
  warmup_steps: 10
  batch_size: 1
  grad_accumulation_steps: 1

  optimizer:
    type: "Muon"
    lr: 3.0e-4
    min_lr: 1.0e-6
    betas: [0.9, 0.95]
    weight_decay: 0.03
    eps: 1.0e-8
    muon:
      momentum: 0.95
      nesterov: true
      ns_steps: 5
      adjust_lr_fn: "match_rms_adamw"

  grad_clip: 1.0
  ema_decay: 0.9999
  ema_warmup_steps: 10

  cfg_dropout:
    p_uncond: 0.1
    p_text_only: 0.25
    p_dino_cls_only: 0.05
    p_dino_patches_only: 0.05
    p_drop_pose: 0.10
    p_pose_only: 0.05

  repa:
    enabled: true
    weight: 0.5
    block_index: -1
    loss_type: "cosine"

  tread:
    enabled: true
    routing_probability: 0.5
    route_start: 1
    route_end: -1
    self_guidance: true
    guidance_scale: 3.0

  timestep_sampling: "logit_normal"
  logit_normal_loc: 0.0
  logit_normal_scale: 1.0

  gradient_checkpointing: false
  mixed_precision: true
  precision: "bfloat16"
  compile: true
  compile_mode: "default"

  # Throughput flags — all OFF for baseline
  tf32_matmul: true
  cudnn_benchmark: true
  fused_optimizer: true
  non_blocking_transfer: true
  set_to_none: true
  vram_dataset: true
  cache_embeddings: false

data:
  shard_base_dir: "data/shards/faces7k"
  buckets:
    - "bucket_1024x1024"
    - "bucket_1216x832"
    - "bucket_1280x768"
    - "bucket_1344x704"
    - "bucket_704x1344"
    - "bucket_768x1280"
    - "bucket_832x1216"
  bucket_sampling: "proportional"
  num_workers: 4
  prefetch_factor: 2
  pin_memory: true

sampling:
  num_steps: 35
  self_guidance: true
  guidance_scale: 3.0

validation:
  enabled: false
  visual_debug_interval: 0

checkpoint:
  save_every: 999999
  keep_last_n: 1
  output_dir: "checkpoints"
  save_optimizer: false

logging:
  log_every: 10
  log_file: "training.log"
  monitor_velocity_norm: true
  monitor_grad_norm: true
