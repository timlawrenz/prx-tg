# Arm 3: +MaskDiT (75% token masking) on top of optimized baseline
# MaskDiT masks 75% of image patches and trains only on visible tokens.
# Uses a lightweight MAE decoder for reconstruction loss.
# Expected: +100-200% on top of optimized baseline (4x fewer tokens processed)

model:
  hidden_size: 768
  depth: 18
  num_heads: 12
  patch_size: 16
  mlp_ratio: 4.0
  in_channels: 3
  prediction_type: x_prediction
  input_size: 1024
  num_pose_joints: 133
  pose_confidence_threshold: 0.05

training:
  total_steps: 300
  warmup_steps: 10
  batch_size: 1
  grad_accumulation_steps: 1
  optimizer:
    type: "Muon"
    lr: 3.0e-4
    min_lr: 1.0e-6
    betas: [0.9, 0.95]
    weight_decay: 0.03
    eps: 1.0e-8
    muon:
      momentum: 0.95
      nesterov: true
      ns_steps: 5
      adjust_lr_fn: "match_rms_adamw"
  grad_clip: 1.0
  ema_decay: 0.9999
  ema_warmup_steps: 10
  cfg_dropout:
    p_uncond: 0.1
    p_text_only: 0.25
    p_dino_cls_only: 0.05
    p_dino_patches_only: 0.05
    p_drop_pose: 0.10
    p_pose_only: 0.05
  repa:
    enabled: true
    weight: 0.5
    block_index: -1
    loss_type: "cosine"
  tread:
    enabled: false
  maskdit:                            # ← MaskDiT enabled
    enabled: true
    mask_ratio: 0.75                  # Mask 75% of image patches
    decoder_depth: 4                  # Lightweight MAE decoder
    mae_loss_weight: 0.1             # Reconstruction loss weight
  timestep_sampling: "logit_normal"
  logit_normal_loc: 0.0
  logit_normal_scale: 1.0
  gradient_checkpointing: false
  mixed_precision: true
  precision: "bfloat16"
  compile: true

data:
  shard_base_dir: "data/shards/faces7k"
  buckets:
    - "bucket_1024x1024"
  num_workers: 4
  prefetch_factor: 2
  pin_memory: true

validation:
  enabled: false

checkpoint:
  save_every: 9999
  keep_last_n: 1
  output_dir: "checkpoints"
  save_optimizer: false

logging:
  log_every: 2
  log_file: "training.log"
  monitor_velocity_norm: true
  monitor_grad_norm: true
